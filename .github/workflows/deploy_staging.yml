name: Deploy WordPress Theme to EC2

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  

      - name: Deploy theme via rsync
        uses: burnett01/rsync-deployments@v7.0.1
        with:
          switches: -avzr --delete --exclude=".git*" --exclude="node_modules"
          path: ./
          remote_path: /var/www/html/wp-content/themes/your-theme/
          remote_host: ${{ secrets.HOST_IP }}
          remote_user: ${{ secrets.USER_NAME }}
          remote_key: ${{ secrets.SSH_KEY }}
